<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0f0a"/><stop offset="1" stop-color="#0e160e"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#39ff14"/><stop offset="1" stop-color="#12b886"/>
    </linearGradient>
    <style>
      .box{fill:#0f1a10;stroke:#1f7a3a;stroke-width:1.5;rx:10}
      .core{fill:#0f2416;stroke:#39ff14;stroke-width:2}
      .lbl{fill:#d6f5df;font-size:14px;font-weight:600}
      .sub{fill:#7fd39a;font-size:11px}
      .title{fill:#39ff14;font-size:22px;font-weight:800;letter-spacing:1px}
      .io{fill:#0c130c;stroke:#2e7d46;stroke-width:1.5}
      .iot{fill:#bff0cd;font-size:13px;font-weight:600}
      .arr{stroke:#39ff14;stroke-width:2;fill:none;marker-end:url(#a)}
    </style>
    <marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#39ff14"/></marker>
  </defs>

  <rect width="880" height="470" fill="url(#bg)"/>
  <text x="40" y="46" class="title">HAWK — Agent Operating System</text>
  <text x="40" y="68" class="sub">Own model · persistent memory · tools · orchestration · self-healing · voice</text>

  <!-- input -->
  <rect x="40" y="100" width="150" height="70" rx="10" class="io"/>
  <text x="115" y="132" text-anchor="middle" class="iot">Voice · Text</text>
  <text x="115" y="152" text-anchor="middle" class="iot">File · Image</text>

  <!-- pipeline boxes -->
  <g>
    <rect x="250" y="92" width="170" height="52" rx="10" class="box"/>
    <text x="335" y="116" text-anchor="middle" class="lbl">Safety &amp; Language</text>
    <text x="335" y="133" text-anchor="middle" class="sub">crisis layer · shield · 7-lang detect</text>

    <rect x="250" y="156" width="170" height="52" rx="10" class="box"/>
    <text x="335" y="180" text-anchor="middle" class="lbl">Şahin Core</text>
    <text x="335" y="197" text-anchor="middle" class="sub">reasoning · planning</text>

    <rect x="250" y="220" width="170" height="52" rx="10" class="box"/>
    <text x="335" y="244" text-anchor="middle" class="lbl">Tool Engine</text>
    <text x="335" y="261" text-anchor="middle" class="sub">web · files · images · device</text>

    <rect x="250" y="284" width="170" height="52" rx="10" class="box"/>
    <text x="335" y="308" text-anchor="middle" class="lbl">Memory Engine</text>
    <text x="335" y="325" text-anchor="middle" class="sub">persistent · per-user isolated</text>

    <rect x="250" y="348" width="170" height="52" rx="10" class="box"/>
    <text x="335" y="372" text-anchor="middle" class="lbl">Agent Orchestrator</text>
    <text x="335" y="389" text-anchor="middle" class="sub">multi-agent · review · synthesize</text>
  </g>

  <!-- HAWK Base core -->
  <rect x="480" y="176" width="180" height="120" rx="14" class="core"/>
  <text x="570" y="222" text-anchor="middle" class="title" font-size="20">HAWK Base</text>
  <text x="570" y="246" text-anchor="middle" class="sub">our own fine-tuned model</text>
  <text x="570" y="266" text-anchor="middle" class="sub">shadow → canary → production</text>
  <text x="570" y="284" text-anchor="middle" class="sub">SHA-256 provenance · rollback</text>

  <!-- self-healing -->
  <rect x="480" y="348" width="180" height="52" rx="10" class="box"/>
  <text x="570" y="372" text-anchor="middle" class="lbl">Self-Healing</text>
  <text x="570" y="389" text-anchor="middle" class="sub">failover · auto-recovery</text>

  <!-- output -->
  <rect x="720" y="200" width="120" height="72" rx="10" class="io"/>
  <text x="780" y="232" text-anchor="middle" class="iot">Answer</text>
  <text x="780" y="252" text-anchor="middle" class="iot">Action · Result</text>

  <!-- arrows -->
  <path class="arr" d="M190,135 L246,118"/>
  <path class="arr" d="M420,236 L476,236"/>
  <path class="arr" d="M660,236 L716,236"/>
</svg>
