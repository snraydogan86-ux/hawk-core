<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b120c"/><stop offset="1" stop-color="#0d1710"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123021"/><stop offset="1" stop-color="#0e2418"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2fd66f"/></marker>
    <style>
      .card{fill:#101a12;stroke:#27492f;stroke-width:1}
      .h{fill:#eafff0;font-size:14px;font-weight:600}
      .s{fill:#7bbf92;font-size:11px}
      .pill{fill:#0e1a12;stroke:#2b6b3f;stroke-width:1}
      .pt{fill:#cdefd8;font-size:12.5px;font-weight:600}
      .flow{stroke:#2fd66f;stroke-width:1.6;fill:none;marker-end:url(#ar);opacity:.9}
    </style>
  </defs>

  <rect width="900" height="420" rx="16" fill="url(#bg)" stroke="#1c3a26"/>
  <text x="42" y="52" fill="#2fd66f" font-size="24" font-weight="800" letter-spacing="0.5">HAWK — Agent Operating System</text>
  <text x="42" y="76" class="s" font-size="12.5">own model · memory · tools · orchestration · cost-aware routing · self-healing · voice</text>

  <!-- input -->
  <rect x="42" y="150" width="128" height="120" rx="12" class="card"/>
  <text x="106" y="200" text-anchor="middle" class="h">Input</text>
  <text x="106" y="222" text-anchor="middle" class="s">voice · text</text>
  <text x="106" y="238" text-anchor="middle" class="s">file · image</text>

  <!-- pipeline column -->
  <g>
    <rect x="222" y="108" width="196" height="46" rx="10" class="pill"/>
    <text x="320" y="130" text-anchor="middle" fill="#eafff0" font-size="13" font-weight="600">Safety &amp; Language</text>
    <text x="320" y="146" text-anchor="middle" class="s">crisis layer · shield · 7-lang</text>

    <rect x="222" y="164" width="196" height="46" rx="10" class="pill"/>
    <text x="320" y="186" text-anchor="middle" fill="#eafff0" font-size="13" font-weight="600">Şahin Core</text>
    <text x="320" y="202" text-anchor="middle" class="s">reasoning · planning · routing</text>

    <rect x="222" y="220" width="196" height="46" rx="10" class="pill"/>
    <text x="320" y="242" text-anchor="middle" fill="#eafff0" font-size="13" font-weight="600">Tool &amp; Memory Engines</text>
    <text x="320" y="258" text-anchor="middle" class="s">web · files · device · recall</text>

    <rect x="222" y="276" width="196" height="46" rx="10" class="pill"/>
    <text x="320" y="298" text-anchor="middle" fill="#eafff0" font-size="13" font-weight="600">Agent Orchestrator</text>
    <text x="320" y="314" text-anchor="middle" class="s">multi-agent · review · synthesize</text>
  </g>

  <!-- HAWK Base core -->
  <rect x="470" y="168" width="196" height="94" rx="16" fill="url(#core)" stroke="#2fd66f" stroke-width="2" filter="url(#glow)"/>
  <text x="568" y="206" text-anchor="middle" fill="#2fd66f" font-size="20" font-weight="800">HAWK Base</text>
  <text x="568" y="228" text-anchor="middle" class="s">our own fine-tuned model</text>
  <text x="568" y="246" text-anchor="middle" class="s">shadow → canary → production</text>

  <!-- self-healing -->
  <rect x="470" y="276" width="196" height="46" rx="10" class="pill"/>
  <text x="568" y="298" text-anchor="middle" fill="#eafff0" font-size="13" font-weight="600">Self-Healing</text>
  <text x="568" y="314" text-anchor="middle" class="s">failover · auto-recovery</text>

  <!-- output -->
  <rect x="718" y="150" width="140" height="120" rx="12" class="card"/>
  <text x="788" y="200" text-anchor="middle" class="h">Output</text>
  <text x="788" y="222" text-anchor="middle" class="s">answer · action</text>
  <text x="788" y="238" text-anchor="middle" class="s">result</text>

  <!-- flows -->
  <path class="flow" d="M170,210 C196,210 200,131 218,131"/>
  <path class="flow" d="M170,210 C196,210 200,187 218,187"/>
  <path class="flow" d="M170,210 C196,210 200,243 218,243"/>
  <path class="flow" d="M170,210 C196,210 200,299 218,299"/>
  <path class="flow" d="M418,210 C444,210 448,214 466,214"/>
  <path class="flow" d="M666,210 C692,210 696,210 714,210"/>
</svg>
